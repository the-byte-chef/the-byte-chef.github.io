<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{% if page.title %}{{ page.title }} | {{ site.title }}{% else %}{{ site.title }}{% endif %}</title>
  <meta name="description" content="{{ page.description | default: site.description }}">
  <link rel="stylesheet" href="/assets/css/style.css">
  {% seo %}
</head>
<body>

<nav class="navbar">
  <a href="/" class="navbar-brand">Byte<span>Chef</span></a>
  <ul class="navbar-nav">
    <li><a href="/" {% if page.url == '/' %}class="active"{% endif %}>Home</a></li>
    <li><a href="/ctf/" {% if page.url contains '/ctf/' %}class="active"{% endif %}>CTF</a></li>
    <li><a href="/thm/" {% if page.url contains '/thm/' %}class="active"{% endif %}>THM</a></li>
    <li><a href="https://github.com/the-byte-chef" target="_blank">GitHub</a></li>
  </ul>
</nav>

{{ content }}

<footer>
  <p>ByteChef &mdash; <a href="https://github.com/the-byte-chef">GitHub</a> &middot; <a href="https://tryhackme.com/p/ByteChef">TryHackMe</a> &middot; <a href="https://linkedin.com/in/josephkushner">LinkedIn</a></p>
</footer>

</body>
</html>
